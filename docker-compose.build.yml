# Override that builds the API image locally instead of pulling the published one.
# Use it when developing the API itself:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
#
services:
  api:
    build:
      context: .
      dockerfile: src/AgentPlatform.Api/Dockerfile
    image: ${API_IMAGE:-ghcr.io/gr4b4z/domsage:latest}
