services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentplatform
      POSTGRES_USER: app
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d agentplatform"]
      interval: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/AgentPlatform.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Database=agentplatform;Username=app;Password=localdev
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - ${HOME}/.agentplatform:/root/.agentplatform:ro
      - blob_data:/data/blobs
    depends_on:
      postgres:
        condition: service_healthy

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8092:8080"
    volumes:
      - ./searxng:/etc/searxng:rw

  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    ports:
      - "8090:8080"
    volumes:
      - signal_data:/home/.local/share/signal-cli
    environment:
      - MODE=json-rpc

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pg_data:
  blob_data:
  signal_data:
